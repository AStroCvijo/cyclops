_base_:
  - ../_base/default.yaml
  - ../_base/nyu.yaml

experiment:
  name: 04_fusion_nyu
  approach: 4
  description: Fusion of frozen SD-UNet + I-JEPA features + trainable decoder (& fusion module).

model:
  encoders:                          # list -> two frozen backbones; the first sets level sizes
    - name: sd_unet
      model_id: stable-diffusion-v1-5/stable-diffusion-v1-5   # ungated, ships safetensors
      timestep: 1
      feature_blocks: [up_1, up_2, up_3, mid]
      prompt: ""
    - name: ijepa
      model_name: facebook/ijepa_vith14_1k
      tap_layers: [8, 16, 24, 32]
      image_size: [420, 560]
  fusion:
    method: concat                   # concat (parameter-free) | cross_attention
    dim: 256                         # cross_attention only: common projection dim
    heads: 8                         # cross_attention only
  decoder:
    name: lightweight
    out_channels: [256, 128, 64, 32]

training:
  batch_size: 2                      # two heavy frozen encoders (SD + ViT-H) -> small batch
  trainable: [fusion, decoder]       # encoders frozen; fusion module + decoder train
  optimizer:
    lr: 2.0e-4

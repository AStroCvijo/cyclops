_base_:
  - ../_base/default.yaml
  - ../_base/nyu.yaml

experiment:
  name: 01_resnet50_nyu
  approach: 1
  description: Supervised baseline — ResNet-50 encoder + lightweight decoder (lower bound).

model:
  encoder:
    name: resnet50
    pretrained: true
    frozen: false
    out_indices: [1, 2, 3, 4]      # multi-scale feature maps fed to decoder
  fusion: null
  decoder:
    name: lightweight
    out_channels: [256, 128, 64, 32]

training:
  epochs: 20
  trainable: null                  # full model trains

# Eval-only: SOTA upper bound, no training. Run with scripts/evaluate.py.
# Switch dataset by changing the `_base_` include below (nyu.yaml / kitti.yaml).
_base_:
  - ../_base/nyu.yaml

experiment:
  name: 05_depthanything_v2_eval
  approach: 5
  mode: eval_only
  description: DepthAnything V2 zero-shot — SOTA upper reference point.

model:
  encoder:
    name: depth_anything
    version: v2                       # v2 | v3
    variant: vitl                     # vits | vitb | vitl
    frozen: true
  fusion: null
  decoder: null                       # model is end-to-end; metric depth head applied at eval

eval:
  metrics: [abs_rel, rmse, delta1]
  align: median                       # affine/median align for relative-depth SOTA models

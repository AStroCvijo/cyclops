_base_:
  - ../_base/default.yaml
  - ../_base/nyu.yaml

experiment:
  name: 03_ijepa_nyu
  approach: 3
  description: Frozen I-JEPA ViT encoder + trainable DPT decoder (semantic patch features).

model:
  encoder:
    name: ijepa
    model_name: facebook/ijepa_vith14_1k
    tap_layers: [8, 16, 24, 32]      # transformer layers reassembled into the pyramid
    image_size: [420, 560]           # ViT input: divisible by patch 14, keeps NYU 4:3 aspect
  fusion: null
  decoder:
    name: dpt                          # DPT-style reassembly suits ViT tokens
    reassemble_channels: [256, 512, 1024, 1024]   # fine -> coarse
    out_channels: [256, 128, 64, 32]              # top-down fusion widths

training:
  batch_size: 16                     # bigger batch: smoother gradients + stable decoder BatchNorm
  trainable: [decoder]               # encoder stays frozen
  optimizer:
    lr: 2.0e-4                        # decoder-only trains fine at a higher LR

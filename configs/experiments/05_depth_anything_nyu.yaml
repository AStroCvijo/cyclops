_base_:
  - ../_base/default.yaml
  - ../_base/nyu.yaml

experiment:
  name: 05_depth_anything_nyu
  approach: 5
  description: DepthAnything V2 metric-indoor zero-shot (eval-only) — SOTA upper bound.

model:
  encoder:
    name: depth_anything
    # Metric-indoor V2 checkpoint (HF): outputs depth in meters, so no alignment is
    # needed on NYU. Use …-Large-hf for a stronger reference, or a V3 metric id once
    # it is on the Hub. (The relative …-Base-hf checkpoints need scale+shift alignment
    # and score much worse with median-only scaling.)
    model_id: depth-anything/Depth-Anything-V2-Metric-Indoor-Base-hf
  decoder: null                    # eval-only: no decoder is trained

eval:
  # The metric-indoor checkpoint was fine-tuned on Hypersim (synthetic), so its
  # absolute scale is offset on NYU (real Kinect). Median-align each prediction to
  # the gt median — the standard zero-shot protocol — to score its structure as the
  # SOTA upper bound rather than the cross-domain scale gap.
  align: median

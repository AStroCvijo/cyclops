checkpoint:
    value:
        dir: outputs
        mode: min
        monitor: abs_rel
        save_best: true
dataset:
    value:
        depth:
            max: 10
            min: 0.001
            scale: 1000
            unit: meter
        eval_crop: eigen
        image_size:
            - 480
            - 640
        name: nyu_depth_v2
        root: data/nyu_depth_v2
        splits:
            test: data/nyu_depth_v2/official_splits/test
            train: data/nyu_depth_v2/sync
device:
    value: cuda
eval:
    value:
        batch_size: 8
        metrics:
            - abs_rel
            - rmse
            - delta1
experiment:
    value:
        approach: 1
        description: Supervised baseline — ResNet-50 encoder + lightweight decoder (lower bound).
        name: 01_resnet50_nyu
logging:
    value:
        log_interval: 50
        wandb:
            enabled: true
            entity: null
            project: cyclops-depth
model:
    value:
        decoder:
            name: lightweight
            out_channels:
                - 256
                - 128
                - 64
                - 32
        encoder:
            frozen: false
            name: resnet50
            out_indices:
                - 1
                - 2
                - 3
                - 4
            pretrained: true
        fusion: null
seed:
    value: 42
training:
    value:
        amp: true
        batch_size: 8
        epochs: 1
        grad_clip: 1
        loss:
            lambda: 0.85
            name: silog
        num_workers: 8
        optimizer:
            lr: 0.0001
            name: adamw
            weight_decay: 0.01
        scheduler:
            name: cosine
            warmup_epochs: 1
        trainable: null
